<!DOCTYPE html>
<html>

<head>
    <title>CART</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap">

    <link rel="stylesheet" href="../CSS/CART-CSS/CART.css">
    <script type="module" defer src="../JS/CART-JS/CART.js"></script>
    <script type="module" defer src="../JS/GLOBAL-JS/GLOBAL.js"></script>
</head>

<body>
    <div class="wrap">
        <div class="hero-header">
            <nav class="nav-bar" id="dynamic-nav-bar"></nav>
            <div class="hero-content">
                <div class="hero-text">
                    <h1>CART</h1>
                </div>
            </div>
        </div>
        <!-- == cart-container == -->
        <div class="cart-container">
            <!-- == item-container == -->
            <div class="item-container" id="dynamic-item-container"></div>
            <!-- == billing-container == -->
            <div class="billing-container">
                <div class="billing-box">
                    <div class="billing-header">
                        <h3>Order Summary</h3>
                    </div>
                    <div class="billing-item-cost">
                        <p>sub-total :</p>
                        <p class="money">Rs. 5,198.00</p>
                    </div>
                    <div class="shipping-charges">
                        <p> Shipping Charges : </p>
                        <p class="money"> Rs. 200.00 </p>
                    </div>
                    <div class="sub-total">
                        <p> Total : </p>
                        <p class="money"> Rs.5,398.00 </p>
                    </div>
                    <div class="total-after-tax">
                        <p> Total (incl. taxes) : </p>
                        <p class="money"> Rs. 5,398.00 </p>
                    </div>

                    <div class="purchase-btn">
                        <button>purchase</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
